<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Approval Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <div class="card">

            <div class="title">
                <h1>🏦 Loan Approval Prediction</h1>
                <p>Fill in the details below to predict loan approval.</p>
            </div>

            <form action="/predict" method="POST">

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                          Age
                          <span style="color:#007BFF; cursor:pointer;"
                            title="Enter your current age in years.">ⓘ</span>
                    </label>
                     <input type="number" name="age" id="age">
                     <small id="ageError" style="color: red;"></small>
                </div>

                <div class="input-box">
                        <label style="display:flex; align-items:center; gap:5px;">
                            Name
                            <span style="color:#007BFF; cursor:pointer;"
                            title="Enter your full name.">ⓘ</span>
                         </label>
                        <input type="text" name="name" id="name" spellcheck="false" min="3" required>
                        <small id="nameError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Annual Income
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Enter your yearly income before taxes.">ⓘ</span>
                    </label>
                    <input type="number" name="income" min="0" id="income" required>
                    <small id="incomeError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Loan Amount
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Enter the total amount of loan you want.">ⓘ</span>
                    </label>
                    <input type="number" name="Loan_amount" min="0" id="loan_amt" required>
                    <small id="loan_amtError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Interest Rate (%)
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Annual interest rate offered for the loan.">ⓘ</span>
                    </label>
                    <input type="number" name="int_rate" step="any" min="0" id="int_rate" max="50" required>
                    <small id="int_rateError"></small>
                </div>


                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Loan Percent Income
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Loan Amount ÷ Annual Income. Example: ₹2,00,000 / ₹10,00,000 = 0.20">ⓘ</span>
                    </label>
                    <input type="number" name="percent_amount" step="any" id="loan_per_inc" required>
                    <small id="loan_per_incError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Credit History Length
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Number of years since your first credit account was opened.">ⓘ</span>
                    </label>
                    <input type="number" name="person_cred_hist_length" id="credit_history" min="0" required>
                    <small id="credit_historyError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Credit Score
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Usually between 300 and 850. Higher scores improve approval chances.">ⓘ</span>
                    </label>
                    <input type="number" name="credit_score"  id="credit_score" required>
                    <small id="credit_scoreError"></small>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Education
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Select your highest completed education level.">ⓘ</span>
                    </label>
                    <select name="person_education" id="education" required>
                        <option value="" selected disabled>Select Education</option>
                        <option value="Associate">Associate</option>
                        <option value="Bachelor">Bachelor</option>
                        <option value="Doctorate">Doctorate</option>
                        <option value="High School">High School</option>
                        <option value="Master">Master</option>
                    </select>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Home Ownership
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Choose whether you own, rent, or have a mortgage.">ⓘ</span>
                    </label>

                    <select name="home_ownership" required>
                        <option value="" selected disabled>Select Ownership</option>
                        <option value="OWN">Own</option>
                        <option value="RENT">Rent</option>
                        <option value="MORTGAGE">Mortgage</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>

                <div class="input-box">
                    <label style="display:flex; align-items:center; gap:5px;">
                        Loan Purpose
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Select the main reason for applying for the loan.">ⓘ</span>
                    </label>

                    <select name="loan_intent" required>
                        <option value="" selected disabled>Select Loan Intent</option>
                        <option value="EDUCATION">Education</option>
                        <option value="HOMEIMPROVEMENT">Home Improvement</option>
                        <option value="MEDICAL">Medical</option>
                        <option value="PERSONAL">Personal</option>
                        <option value="VENTURE">Venture</option>
                        <option value="DEBTCONSOLIDATION">Debt Consolidation</option>
                    </select>
                </div>

                <div class="radio-section">

                    <label class="radio-title">
                        Previous Loan Defaults
                    </label>

                <div class="radio-group">

                    <label class="radio-title" style="display:flex; align-items:center; gap:5px;">
                        Previous Loan Defaults
                        <span style="color:#007BFF; cursor:pointer;"
                            title="Choose 'Yes' if you have previously failed to repay a loan.">
                            ⓘ
                        </span>
                    </label>

                    <label class="radio-option">
                        <input type="radio"
                            name="previous_loan_defaults"
                            value="Yes"
                            required>
                        Yes
                    </label>

                    <label class="radio-option">
                        <input type="radio"
                            name="previous_loan_defaults"
                            value="No">
                        No
                    </label>

                </div>

                </div>

                <div class="buttons">

                    <button class="predict-btn" type="submit">
                        Predict Loan Status
                    </button>

                    <button class="reset-btn" type="reset">
                        Reset
                    </button>

                </div>

            </form>



            <div class="prediction-box">

                <h2>Prediction Result</h2>

                <div class="prediction-result">
                    {{ prediction }}
                </div>

            </div>


        </div>

    </div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
</body>

</html>
